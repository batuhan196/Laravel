name: FTP Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, fileinfo, mysql, pdo_mysql

      - name: Create .env for build
        run: |
          cp .env.example .env
          php artisan key:generate --ansi

      - name: Create production .env for server
        run: |
          cat > .env.production << 'EOF'
          APP_NAME="Okul Envanter Sistemi"
          APP_ENV=production
          APP_KEY=base64:YdkRS6Onhwgj51WVq68k231Hib9o8dcbJ0g6z7w1CUU=
          APP_DEBUG=false
          APP_URL=http://425.altekbilisim.com

          APP_LOCALE=tr
          APP_FALLBACK_LOCALE=tr
          APP_FAKER_LOCALE=tr_TR

          LOG_CHANNEL=stack
          LOG_STACK=single
          LOG_LEVEL=error

          DB_CONNECTION=mysql
          DB_HOST=localhost
          DB_PORT=3306
          DB_DATABASE=alt300iliscomtr_batuhanteke
          DB_USERNAME=alt300iliscomtr_batuhanteke
          DB_PASSWORD=425batuhanteke

          SESSION_DRIVER=file
          SESSION_LIFETIME=120
          SESSION_ENCRYPT=false
          SESSION_PATH=/
          SESSION_DOMAIN=null

          BROADCAST_CONNECTION=log
          FILESYSTEM_DISK=local
          QUEUE_CONNECTION=sync

          CACHE_STORE=file

          MAIL_MAILER=log
          MAIL_FROM_ADDRESS="hello@example.com"
          MAIL_FROM_NAME="Okul Envanter Sistemi"

          VITE_APP_NAME="Okul Envanter Sistemi"

          TURNSTILE_SITE_KEY=1x00000000000000000000AA
          TURNSTILE_SECRET_KEY=1x0000000000000000000000000000000AA
          EOF

      - name: Install Dependencies
        run: |
          composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --no-dev --optimize-autoloader
          php artisan package:discover --ansi

      - name: Patch Laravel Framework
        run: php patch-laravel.php

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Assets
        run: |
          npm install
          npm run build

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ./
          timeout: 300000
          protocol: ftp
          security: loose
          exclude: |
            **/.env
            **/.env.example
            **/.git*
            **/.git*/**
            **/.github/**
            **/.gitignore
            **/.gitkeep
            **/README.md
            **/tests/**
            **/node_modules/**
            **/phpunit.xml
            **/package.json
            **/package-lock.json
            **/vite.config.js
            **/tailwind.config.js
            **/postcss.config.js
            **/deployment_guide.md
            **/migration_log.txt
            **/patch-laravel.php
          log-level: standard
          dry-run: false
          dangerous-clean-slate: false


